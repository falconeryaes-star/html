  <main class="app"><aside class="side"><div class="brand"><h1>图片风格分析与生成指令工具</h1><span class="pill">本地处理</span></div><label class="drop" id="drop"><input id="file" type="file" accept="image/*"><img id="preview" class="preview" alt="上传图片预览"><span id="empty" class="empty"><strong>上传或拖入一张图片</strong>支持 JPG、PNG、WebP 等格式。图片只在当前浏览器中分析。</span></label><div class="meta"><div class="box"><span class="label">文件</span><span id="name" class="value">未选择</span></div><div class="box"><span class="label">尺寸</span><span id="size" class="value">-</span></div></div><section><span class="label">指令模式</span><div class="tabs" id="tabs"><button class="active" data-mode="general">通用图片生成</button><button data-mode="product">产品图</button><button data-mode="portrait">人物/肖像</button><button data-mode="poster">海报/封面</button><button data-mode="web">网页/视觉设计参考</button></div></section></aside><section class="main"><div class="top"><div id="summary" class="summary">上传图片后，会生成色彩、构图、纹理、风格标签和可复制的 Codex 指令。</div><div class="actions"><button id="copyReport" class="btn" disabled>复制分析报告</button><button id="copyAi" class="btn" disabled>复制AI增强请求</button><button id="copyPrompt" class="btn primary" disabled>复制完整指令</button></div></div><div class="grid"><section class="panel"><div class="head"><h2>风格分析</h2><span id="status" class="label">等待图片</span></div><div id="analysis" class="body"><div class="blank">请选择一张图片。这里会显示主色、辅助色、画面结构、复杂度和风格标签。</div></div></section><section class="panel"><div class="head"><h2>可复制指令</h2><span id="promptStatus" class="label">尚未生成</span></div><div class="body"><div class="out"><div><label for="prompt">Codex 图片生成指令</label><textarea id="prompt" readonly placeholder="上传图片后自动生成。"></textarea></div><div><label for="ai">AI 增强分析请求</label><textarea id="ai" readonly placeholder="上传图片后自动生成。"></textarea></div></div></div></section></div></section></main><div id="toast" class="toast">已复制</div>

    function load(f){statusEl.textContent="分析中";promptStatus.textContent="生成中";nameEl.textContent=f.name;const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{preview.src=r.result;preview.style.display="block";empty.style.display="none";sizeEl.textContent=`${img.naturalWidth} x ${img.naturalHeight}`;data=analyze(img,f);renderAnalysis(data);renderOutputs(data);enable(true);statusEl.textContent="已完成";detectPortrait(img,data)};img.onerror=()=>fail("这张图片无法读取，请换一张常见格式的图片。");img.src=r.result};r.onerror=()=>fail("读取图片失败，请重新选择文件。");r.readAsDataURL(f)}function fail(msg){data=null;enable(false);statusEl.textContent="失败";promptStatus.textContent="尚未生成";summary.textContent=msg;analysisEl.innerHTML=`<div class="blank">${esc(msg)}</div>`;promptEl.value="";aiEl.value=""}function enable(v){[copyReport,copyAi,copyPrompt].forEach(b=>b.disabled=!v)}

total,dark:dark/total,lowSat:lowSat/total,highSat:highSat/total,center,faceHint:skinFace(px,w,h)};out.composition=composition(out);out.colorMood=colorMood(out);out.layoutMood=layoutMood(out);out.tags=tags(out);return out}
    function skinFace(px,w,h){const seen=new Uint8Array(w*h),skin=new Uint8Array(w*h);for(let i=0,p=0;i<px.length;i+=4,p++){const r=px[i],g=px[i+1],b=px[i+2],hsl=rgbToHsl(r,g,b),y=.299*r+.587*g+.114*b,cb=128-.168736*r-.331264*g+.5*b,cr=128+.5*r-.418688*g-.081312*b,upper=Math.floor(p/w)<h*.72,warm=(hsl.h<55||hsl.h>335)&&hsl.s>.05&&hsl.s<.7,yc=cb>75&&cb<145&&cr>125&&cr<185,rgb=r>55&&g>35&&b>25&&r>g*.92&&r>b*.95&&Math.max(r,g,b)-Math.min(r,g,b)>8;if(upper&&y>35&&y<245&&((warm&&rgb)||(yc&&rgb)))skin[p]=1}let best=null;for(let p=0;p<skin.length;p++){if(!skin[p]||seen[p])continue;const stack=[p];seen[p]=1;let minX=w,maxX=0,minY=h,maxY=0,count=0,lum=0;while(stack.length){const q=stack.pop(),x=q%w,y=Math.floor(q/w);count++;minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);const i=q*4;lum+=luma(px[i],px[i+1],px[i+2]);for(const n of [q-1,q+1,q-w,q+w])if(n>=0&&n<skin.length&&skin[n]&&!seen[n]&&Math.abs(n%w-x)<=1){seen[n]=1;stack.push(n)}}const bw=maxX-minX+1,bh=maxY-minY+1,area=count/(w*h),aspect=bw/bh,cx=(minX+maxX)/2/w,cy=(minY+maxY)/2/h;if(count<18||cy>.62||aspect<.35||aspect>1.8)continue;const score=count*(1.35-cy)*(aspect>.55&&aspect<1.25?1.35:1)*(area>.006&&area<.16?1.2:1);if(!best||score>best.score)best={score,area,cx,cy,bw,bh,brightness:lum/count}}if(!best)return{found:false};const facePosition=`${best.cx<.42?"偏左":best.cx>.58?"偏右":"居中"}${best.cy<.38?"偏上":best.cy>.62?"偏下":"居中"}`;return{found:true,area:best.area,facePercent:Math.max(1,Math.round(best.area*100)),facePosition,brightness:Math.round(best.brightness),clarity:Math.round(Math.min(100,(best.bw+best.bh)/(w+h)*160))}}function merge(arr){const m=[];arr.forEach(c=>{const e=m.find(x=>dist(x,c)<42);if(e){const t=e.count+c.count;e.r=Math.round((e.r*e.count+c.r*c.count)/t);e.g=Math.round((e.g*e.count+c.g*c.count)/t);e.b=Math.round((e.b*e.count+c.b*c.count)/t);e.percent+=c.percent;e.count=t;e.s=Math.max(e.s,c.s)}else m.push({...c})});return m.sort((a,b)=>b.percent-a.percent)}function function portraitAdvice(area,a,f){const tips=[],pros=[];const fb=f?f.brightness:a.avgB,fc=f?f.clarity:a.edge;if(fb>48&&fb<78)pros.push("脸部明度比较舒服");else tips.push(fb<=48?"脸部偏暗，建议增加正面柔光或降低逆光":"脸部偏亮，建议压高光保留皮肤层次");if(fc>16)pros.push("五官/轮廓有一定清晰度");else tips.push("脸部清晰度不足，建议提高对焦、减少模糊或放大脸部区域");if(a.contrast>22&&a.contrast<55)pros.push("明暗层次适合修图展示");else tips.push(a.contrast<=22?"对比偏平，脸部立体感可以加强":"对比偏强，容易显得硬或暴露瑕疵");if(area<.015)tips.push("脸部占画面太小，不适合判断五官细节");if(area>.24)tips.push("脸部占画面过大，容易压迫构图");if(a.negative>.12&&a.negative<.58)pros.push("画面留白和主体关系较稳");return `优点：${pros.length?pros.join("、"):"整体构图可作为人物参考"}。可改进：${tips.length?tips.join("、"):"主要保持当前光线和角度，再细化妆发与表情"}。审美级别说明：这是基于照片呈现的上镜潜力判断，不是对本人价值的评价。`}function portraitLevel(area,a){let score=0;if(area>.035&&area<.22)score+=2;else if(area>.015)score+=1;if(a.avgB>45&&a.avgB<78)score+=1;if(a.contrast>22&&a.contrast<55)score+=1;if(a.edge>12&&a.edge<55)score+=1;if(a.negative>.15&&a.negative<.55)score+=1;if(score>=6)return"商业头像/高颜值展示潜力";if(score>=4)return"上镜好看，适合精修展示";if(score>=2)return"清秀耐看，但需要优化光线、角度或清晰度";return"当前图片不适合判断颜值级别，建议换更清晰的人物图"}
function buildPortraitAi(a){const score=portraitScores(a);return [`请只针对图片中的人物做形象与上镜表现分析，不识别身份，不推断年龄、种族、健康、性取向等敏感属性。请使用温和表达，只给“优势”和“可优化项”，不要使用攻击性评价。`,"",`网页本地初步分析如下：`,report||buildReport(a),"",`本地人物评分估算：综合 ${score.total}/100，${score.grade}。`,`分项：${score.groups.map(g=>`${g.name} ${g.score}/${g.max}`).join("；")}。`,"",`请按以下 100 分制重新精确复核，说明每项扣分原因和优化建议：`,`1. 面部比例协调度 25 分：三庭比例 10、五眼比例 8、面部留白 7。`,`2. 脸型与轮廓 20 分：脸型流畅度 8、下颌与下巴 6、面部立体度 6。`,`3. 五官协调度 25 分：眼睛与眉眼区 8、鼻子与面中 7、嘴唇与下庭 5、五官整体匹配度 5。`,`4. 皮肤与状态 15 分：皮肤干净度 6、气色与精神状态 5、紧致清爽感 4。`,`5. 表情、气质与上镜感 15 分：表情自然度 5、气质统一度 5、拍照表现力 5。`,"",`输出格式请包含：综合评分、五个维度分数、眼睛分析、鼻子分析、嘴唇分析、三庭五眼分析、脸型轮廓分析、优势分析、可优化项、拍照角度建议、发型/妆容建议。`,`最后给一段用于生成同风格人物图的中文提示词，保持人物气质、构图、光线和质感，不复制原图身份或具体文字。`].join("\n")}
    async function copy(t){if(!t)return;try{await navigator.clipboard.writeText(t)}catch(e){const x=document.createElement("textarea");x.value=t;document.body.appendChild(x);x.select();document.execCommand("copy");x.remove()}toast.textContent="已复制到剪贴板";toast.classList.add("show");clearTimeout(copy.timer);copy.timer=setTimeout(()=>toast.classList.remove("show"),1500)}function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s=0,l=(max+min)/2;if(max!==min){const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);h=max===r?(g-b)/d+(g<b?6:0):max===g?(b-r)/d+2:(r-g)/d+4;h*=60}return{h,s,l}}function luma(r,g,b){return(0.2126*r+0.7152*g+0.0722*b)/255*100}function hexColor(c){return"#"+[c.r,c.g,c.b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,"0")).join("").toUpperCase()}function dist(a,b){return Math.hypot(a.r-b.r,a.g-b.g,a.b-b.b)}function esc(v){return String(v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
